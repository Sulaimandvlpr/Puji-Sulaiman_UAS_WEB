<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Redirect to index.html with path as query
      const path = window.location.pathname.slice(1)
      if (path) {
        window.location.replace(
          window.location.origin + '/?redirect=' + path
        )
      }
    </script>
  </head>
  <body></body>
</html>
